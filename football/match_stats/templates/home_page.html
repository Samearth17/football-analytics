<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Stats: England vs Colombia</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'styles.css' %}">

</head>
<body class="dark-theme">
   

    <div class="match-container">
        <div class="tabs">
            <div class="tab">TIMELINE</div>
            <div class="tab">LINEUPS</div>
            <div class="tab active">STATS</div>
        </div>
<div class="match-header">
            <div class="team-logo">
                <img src="{% static 'images/england.webp' %}" alt="England" class="logo-img">
                <div class = "team-name">ENGLAND</div>
            </div>
            <h1 class="match-title">1-1</h1>
            <!--div class="score-display">
                <div class="score"></div>
                <div class="score-divider"> - </div>
                <div class="score"></div>
            </div-->
            <div class="match-status"></div>
            <div class="team-logo">
                <img src="{% static 'images/colombia.png' %}" alt="Colombia" class="logo-img">
                <div class = "team-name">COLOMBIA</div>
            </div>
        </div>
        
        <div class="stats-header">
            
            <div class="header-label">TEAM STATS</div>
        </div>
<div class="time-controls">
  <label>Start (min):</label>
  <input type="range" id="start-slider" min="0" max="90" value="0">
  <span id="start-label">0'</span> | 
  <label>End (min):</label>
  <input type="range" id="end-slider" min="0" max="90" value="90">
  <span id="end-label">90'</span>
  <button id="update-stats">Update</button>
</div>
<div id="stats-content">...</div>


        
        <div id="stats-content">
           
        </div>
<div id="heatmap-container" style="padding: 20px; background: white;">
  <h3>Heatmap (current period)</h3>
  <img id="heatmap-img" style="width:100%; height:400px; border-radius: 12px;" alt="Heatmap">
</div>

<div id="pass-network-container" style="padding: 20px; background: white; margin-top: 20px;">
  <h3>Pass Network (current period)</h3>
  <img id="pass-network-img" style="width:100%; height:400px; border-radius: 12px;" alt="Pass Network">
</div>
</div>
        
</div>

    </div>
    
    <script src="{% static 'script.js' %}"></script>

</body>
</html>
